networks:
  grid:
    driver: bridge
    internal: true

services:

  selenium:
    image: selenium/hub:4
    hostname: ${COMPOSE_PROJECT_NAME}_selenium
    container_name: ${COMPOSE_PROJECT_NAME}_selenium
    privileged: true
    ports:
      - 4444:4444
      - 4443:4443
      - 4442:4442
    networks:
      - grid
